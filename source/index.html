      #cookie-banner{position:fixed;bottom:0;left:0;right:0;z-index:100000;background:rgba(13,18,32,0.97);border-top:1px solid rgba(255,255,255,0.1);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:system-ui,sans-serif;font-size:13px;color:rgba(255,255,255,0.7);backdrop-filter:blur(12px);transform:translateY(calc(100% + 120px));transition:transform 0.3s ease;}
      @media (max-width: 768px) { #cookie-banner { bottom: 64px !important; flex-wrap:wrap; justify-content:center; gap:8px; padding:14px 16px; } #cookie-banner span { text-align:center; width:100%; } #cookie-banner div { width:100%; display:flex; gap:8px; } #cookie-banner button { flex:1; } }
      #cookie-banner.visible{transform:translateY(0);}
      #cookie-banner button{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.2s;min-height:44px;min-width:44px;}

  <body>
    <div id="root">
      <h1 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">B-Social – Oplev verden sammen – Find events, steder og oplevelser i Danmark og hele verden</h1>
    </div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Cookie Consent Logic -->
    <div id="cookie-banner">
      <span>Vi bruger cookies for at forbedre din oplevelse. <a href="/privatlivspolitik" style="color:#4ECDC4;text-decoration:underline;padding:8px 4px;display:inline-block;min-height:44px;line-height:28px;">Læs mere</a></span>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button id="cookie-decline">Afvis</button>
        <button id="cookie-accept">Acceptér</button>
      </div>
    </div>
    <script>
      (function(){
        var consent = localStorage.getItem('b-social-cookie-consent');
        var banner = document.getElementById('cookie-banner');
        if (!consent && banner) {
          setTimeout(function(){ banner.classList.add('visible'); document.body.classList.add('cookie-banner-open'); }, 1000);
          document.getElementById('cookie-accept').addEventListener('click', function(){
            localStorage.setItem('b-social-cookie-consent', 'accepted');
            banner.classList.remove('visible'); document.body.classList.remove('cookie-banner-open');
          });
          document.getElementById('cookie-decline').addEventListener('click', function(){
            localStorage.setItem('b-social-cookie-consent', 'declined');
            banner.classList.remove('visible'); document.body.classList.remove('cookie-banner-open');
          });
        }
      })();
    </script>

    <!-- Self-destructing Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('sw.js').then(function(reg) {
            console.log('SW registered (self-destruct):', reg.scope);
          }).catch(function(err) {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
